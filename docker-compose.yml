version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tci_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-technopath_commerce}
      POSTGRES_USER: ${DB_USERNAME:-tci}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-tci}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tci_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
